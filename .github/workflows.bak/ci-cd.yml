name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Lint with flake8
        run: |
          flake8 . --exclude=venv,__pycache__,.git --max-line-length=100

      - name: Check formatting with black
        run: |
          black --check . --exclude=venv,__pycache__,.git

      - name: Check imports with isort
        run: |
          isort --check-only . --skip-gitignore

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_educacao_fisica
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run migrations
        env:
          DB_NAME: test_educacao_fisica
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
        run: |
          python manage.py migrate

      - name: Run tests
        env:
          DB_NAME: test_educacao_fisica
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
        run: |
          pytest --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t educacao-fisica:${{ github.sha }} .

      - name: Run container health check
        run: |
          docker run -d --name test-container educacao-fisica:${{ github.sha }}
          sleep 10
          docker ps --filter "name=test-container" --filter "status=running"
          docker stop test-container
          docker rm test-container